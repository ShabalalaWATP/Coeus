name: DAST Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "7 5 * * 3"

permissions:
  contents: read

jobs:
  zap-baseline:
    name: zap-baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          uv sync --project apps/api --frozen --all-groups
          pnpm install --frozen-lockfile
      - name: Check fail-closed DAST policy
        run: pnpm security-policy:check
      - name: Build web app
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8001
        run: pnpm --filter @coeus/web build
      - name: Start local target
        env:
          COEUS_ALLOWED_CORS_ORIGINS: '["http://127.0.0.1:4173"]'
          COEUS_PERSISTENCE_PROVIDER: memory
          COEUS_OBJECT_STORAGE_PROVIDER: local
          COEUS_EMAIL_PROVIDER: outbox
        run: |
          uv run --directory apps/api uvicorn coeus.main:app \
            --host 127.0.0.1 \
            --port 8001 > zap-api.log 2>&1 &
          pnpm --filter @coeus/web exec vite preview \
            --host 0.0.0.0 \
            --port 4173 > zap-web.log 2>&1 &
      - name: Wait for local target
        run: |
          curl --retry 30 --retry-all-errors --retry-delay 2 \
            http://127.0.0.1:8001/api/v1/health/live
          curl --retry 30 --retry-all-errors --retry-delay 2 \
            http://127.0.0.1:4173
      - name: ZAP baseline
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: http://127.0.0.1:4173
          allow_issue_writing: false
          fail_action: true
          artifact_name: zap-baseline
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a"
      - name: Upload local target logs
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-local-target-logs
          path: |
            zap-api.log
            zap-web.log
          if-no-files-found: ignore
