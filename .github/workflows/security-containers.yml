name: Container Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "37 4 * * 3"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  container-scan:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build API image
        run: docker build -f infra/docker/api.Dockerfile -t coeus-api:${{ github.sha }} .
      - name: Build web image
        run: |
          docker build \
            -f infra/docker/web-prod.Dockerfile \
            --build-arg VITE_API_BASE_URL=http://127.0.0.1:8001 \
            -t coeus-web:${{ github.sha }} .
      - name: Scan API image SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: coeus-api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: 0
          version: v0.72.0
      - name: Scan web image SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: coeus-web:${{ github.sha }}
          format: sarif
          output: trivy-web.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: 0
          version: v0.72.0
      - name: Upload API Trivy SARIF
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api
      - name: Upload web Trivy SARIF
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web
      - name: Enforce API image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: coeus-api:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: 1
          version: v0.72.0
      - name: Enforce web image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: coeus-web:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: 1
          version: v0.72.0
