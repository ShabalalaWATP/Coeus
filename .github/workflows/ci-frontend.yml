name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter @coeus/web lint
      - name: Typecheck
        run: pnpm --filter @coeus/web typecheck
      - name: Unit tests and coverage
        run: pnpm --filter @coeus/web test
      - name: Build
        run: pnpm --filter @coeus/web build
      - name: Install Playwright browser
        run: pnpm --filter @coeus/web exec playwright install --with-deps chromium
      - name: Playwright smoke
        run: pnpm --filter @coeus/web test:e2e
