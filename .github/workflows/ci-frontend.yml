name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      COEUS_TEST_DATABASE_URL: postgresql+psycopg://coeus:coeus-test-only@127.0.0.1:5432/coeus_test
    services:
      postgres:
        image: pgvector/pgvector:pg16@sha256:0a07c4114ba6d1d04effcce3385e9f5ce305eb02e56a3d35948a415a52f193ec
        env:
          POSTGRES_DB: coeus_test
          POSTGRES_USER: coeus
          POSTGRES_PASSWORD: coeus-test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coeus -d coeus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install backend dependencies for real Playwright integration
        run: uv sync --project apps/api --frozen --all-groups
      - name: Formatting
        run: pnpm --filter @coeus/web format:check
      - name: Lint
        run: pnpm --filter @coeus/web lint
      - name: Typecheck
        run: pnpm --filter @coeus/web typecheck
      - name: Dead code
        run: pnpm dead-code
      - name: Unit tests and coverage
        run: pnpm --filter @coeus/web test
      - name: Production dependency audit
        run: pnpm --filter @coeus/web audit --prod --audit-level moderate
      - name: Build
        run: pnpm --filter @coeus/web build
      - name: Install Playwright browser
        run: pnpm --filter @coeus/web exec playwright install --with-deps chromium
      - name: Playwright real-stack and UI smoke
        run: pnpm --filter @coeus/web test:e2e
      - name: Playwright PostgreSQL security workflow
        run: pnpm playwright:postgres
