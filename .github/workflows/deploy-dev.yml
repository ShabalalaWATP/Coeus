name: Future GCP Migration Reference

on:
  workflow_dispatch:
    inputs:
      confirm_migration_reference:
        description: "Confirm this is an authorised future-migration exercise"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-reference:
    if: ${{ inputs.confirm_migration_reference == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false
      - name: Validate Terraform reference
        working-directory: infra/gcp/environments/dev
        run: |
          terraform fmt -check -recursive ../..
          terraform init -backend=false
          terraform validate
          terraform test
          terraform -chdir=../../modules/cloud_run_service init -backend=false
          terraform -chdir=../../modules/cloud_run_service test
      - name: Build API migration-reference image locally
        run: docker build -f infra/docker/api.Dockerfile -t coeus-api:migration-reference .
      - name: Build web migration-reference image locally
        run: |
          docker build \
            --build-arg "VITE_API_BASE_URL=http://127.0.0.1:8000" \
            -f infra/docker/web-prod.Dockerfile \
            -t coeus-web:migration-reference .
      - name: Reference summary
        run: >-
          echo "Validated and built locally only. No cloud authentication, push,
          infrastructure change, traffic change, or deployment occurred."
          >> "${GITHUB_STEP_SUMMARY}"
