server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # The SPA loads its own bundles from this origin and calls the API over HTTPS.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" always;
  # nginx sits behind Cloud Run TLS termination, so HTTPS is always in effect here.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
