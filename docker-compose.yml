name: coeus

services:
  postgres:
    image: pgvector/pgvector:pg16@sha256:0a07c4114ba6d1d04effcce3385e9f5ce305eb02e56a3d35948a415a52f193ec
    environment:
      POSTGRES_DB: coeus
      POSTGRES_USER: coeus
      POSTGRES_PASSWORD: coeus-local
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - coeus-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coeus -d coeus"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z@sha256:a616cd8f37758b0296db62cc9e6af05a074e844cc7b5c0a0e62176d73828d440
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: coeus-local
      MINIO_ROOT_PASSWORD: coeus-local-password
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - coeus-minio:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      COEUS_ENVIRONMENT: local
      COEUS_DATABASE_URL: postgresql+asyncpg://coeus:coeus-local@postgres:5432/coeus
      COEUS_ALLOWED_CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
      COEUS_LOG_LEVEL: INFO
      COEUS_PERSISTENCE_PROVIDER: postgres
      COEUS_OBJECT_STORAGE_PROVIDER: local
      COEUS_LOCAL_OBJECT_STORAGE_PATH: /var/lib/coeus/objects
      COEUS_ASSET_TOKEN_SECRET: local-docker-only-asset-token-secret-32
      COEUS_CONFIGURATION_ENCRYPTION_KEY_PATH: /var/lib/coeus/secrets/configuration.key
      COEUS_EMAIL_PROVIDER: outbox
      COEUS_JIOC_AGENT_ROUTING_ENABLED: active
      COEUS_JIOC_ROUTING_APPROVED_RELEASES: '["jioc-routing-policy-v2:jioc-routing-eval-v2"]'
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - coeus-api-local-data:/var/lib/coeus
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  coeus-postgres:
  coeus-minio:
  coeus-api-local-data:
